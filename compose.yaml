services:
  leaveflow:
    image: leaveflow
    build:
      context: .
      dockerfile: LeaveFlow/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=leaveflow;Username=leaveflow;Password=leaveflowpw"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: leaveflow
      POSTGRES_USER: leaveflow
      POSTGRES_PASSWORD: leaveflowpw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaveflow -d leaveflow"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata: